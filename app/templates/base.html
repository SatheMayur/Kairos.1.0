<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}AI Recruitment{% endblock %} — Admin</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f0f11;color:#e4e4e7;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;min-height:100vh}
a{color:inherit;text-decoration:none}
.layout{display:flex;min-height:100vh}
/* Sidebar */
.sidebar{width:220px;background:#18181b;border-right:1px solid #27272a;padding:20px 0;flex-shrink:0;position:fixed;height:100vh;overflow-y:auto;z-index:100}
.sidebar-logo{padding:0 20px 18px;border-bottom:1px solid #27272a;margin-bottom:10px}
.sidebar-logo h2{font-size:13px;font-weight:700;color:#fff;letter-spacing:.5px}
.sidebar-logo p{font-size:11px;color:#71717a;margin-top:3px}
.nav-section{font-size:10px;color:#52525b;text-transform:uppercase;letter-spacing:1px;font-weight:700;padding:10px 20px 4px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 20px;color:#a1a1aa;font-size:13px;cursor:pointer;transition:background .12s}
.nav-item:hover{background:#27272a;color:#fff}
.nav-item.active{background:#27272a;color:#fff;border-right:2px solid #10b981}
.nav-dot{width:6px;height:6px;border-radius:50%;background:#3f3f46;flex-shrink:0}
.nav-item.active .nav-dot{background:#10b981}
/* Main */
.main{margin-left:220px;flex:1;padding:28px 32px;min-width:0}
/* Top bar */
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
.topbar-left h1{font-size:20px;font-weight:700;color:#fff}
.topbar-left p{font-size:12px;color:#71717a;margin-top:3px}
.live-badge{display:inline-flex;align-items:center;gap:7px;background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.2);color:#10b981;padding:5px 12px;border-radius:999px;font-size:11px;font-weight:600}
.pulse{width:7px;height:7px;border-radius:50%;background:#10b981;position:relative;flex-shrink:0}
.pulse::before{content:'';position:absolute;inset:-3px;border-radius:50%;background:#10b981;animation:ping 1.5s ease-in-out infinite;opacity:.6}
@keyframes ping{0%,100%{transform:scale(1);opacity:.6}50%{transform:scale(1.8);opacity:0}}
/* Cards */
.card{background:#18181b;border:1px solid #27272a;border-radius:12px;overflow:hidden;margin-bottom:20px}
.card-header{padding:14px 18px;border-bottom:1px solid #27272a;display:flex;align-items:center;justify-content:space-between;gap:12px}
.card-title{font-size:13px;font-weight:600;color:#fff}
.card-body{padding:18px}
/* KPI grid */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.kpi{background:#18181b;border:1px solid #27272a;border-radius:12px;padding:18px}
.kpi-label{font-size:11px;color:#71717a;text-transform:uppercase;letter-spacing:.7px;font-weight:600}
.kpi-value{font-size:30px;font-weight:700;margin:6px 0 2px}
.kpi-sub{font-size:11px;color:#52525b}
.kpi.blue .kpi-value{color:#60a5fa}
.kpi.green .kpi-value{color:#34d399}
.kpi.yellow .kpi-value{color:#fbbf24}
.kpi.purple .kpi-value{color:#a78bfa}
.kpi.red .kpi-value{color:#f87171}
/* Badges */
.badge{padding:2px 8px;border-radius:999px;font-size:11px;font-weight:600;white-space:nowrap}
.badge-green{background:rgba(52,211,153,.1);color:#34d399;border:1px solid rgba(52,211,153,.2)}
.badge-yellow{background:rgba(251,191,36,.1);color:#fbbf24;border:1px solid rgba(251,191,36,.2)}
.badge-red{background:rgba(239,68,68,.1);color:#f87171;border:1px solid rgba(239,68,68,.2)}
.badge-blue{background:rgba(96,165,250,.1);color:#60a5fa;border:1px solid rgba(96,165,250,.2)}
.badge-grey{background:rgba(113,113,122,.15);color:#a1a1aa;border:1px solid rgba(113,113,122,.2)}
.badge-purple{background:rgba(167,139,250,.1);color:#a78bfa;border:1px solid rgba(167,139,250,.2)}
/* Table */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{text-align:left;font-size:11px;color:#71717a;text-transform:uppercase;letter-spacing:.7px;padding:10px 14px;border-bottom:1px solid #27272a;white-space:nowrap;font-weight:600}
td{padding:11px 14px;border-bottom:1px solid #1f1f23;font-size:13px;color:#d4d4d8;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.02)}
/* Forms */
.form-group{margin-bottom:16px}
label{display:block;font-size:12px;color:#a1a1aa;margin-bottom:5px;font-weight:500}
input[type=text],input[type=number],input[type=email],select,textarea{width:100%;background:#27272a;border:1px solid #3f3f46;border-radius:8px;padding:9px 12px;color:#e4e4e7;font-size:13px;outline:none;transition:border-color .15s;font-family:inherit}
input:focus,select:focus,textarea:focus{border-color:#10b981}
textarea{resize:vertical;min-height:100px}
/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .15s;font-family:inherit}
.btn-primary{background:#10b981;color:#fff}.btn-primary:hover{background:#059669}
.btn-secondary{background:#27272a;color:#e4e4e7;border:1px solid #3f3f46}.btn-secondary:hover{background:#3f3f46}
.btn-danger{background:rgba(239,68,68,.15);color:#f87171;border:1px solid rgba(239,68,68,.2)}.btn-danger:hover{background:rgba(239,68,68,.25)}
.btn-sm{padding:5px 10px;font-size:12px}
.btn:disabled{opacity:.5;cursor:not-allowed}
/* Alerts */
.alert{padding:12px 16px;border-radius:10px;margin-bottom:16px;font-size:13px}
.alert-error{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);color:#f87171}
.alert-success{background:rgba(52,211,153,.08);border:1px solid rgba(52,211,153,.2);color:#34d399}
.alert-info{background:rgba(96,165,250,.08);border:1px solid rgba(96,165,250,.2);color:#60a5fa}
/* Misc */
.empty-state{text-align:center;padding:48px 20px;color:#52525b}
.empty-state p{margin-top:8px;font-size:13px}
.score-bar-wrap{display:flex;align-items:center;gap:8px;min-width:120px}
.score-bar{flex:1;height:4px;background:#27272a;border-radius:999px;overflow:hidden}
.score-fill{height:100%;border-radius:999px;background:#10b981;transition:width .4s}
.score-text{font-size:12px;font-weight:700;white-space:nowrap;min-width:36px;text-align:right}
.flex{display:flex}.items-center{align-items:center}.gap-2{gap:8px}.gap-3{gap:12px}.justify-between{justify-content:space-between}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.mt-1{margin-top:6px}.mt-2{margin-top:12px}.mt-3{margin-top:20px}
.text-muted{color:#71717a}.text-sm{font-size:12px}
#toast-container{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast{padding:12px 18px;border-radius:10px;font-size:13px;font-weight:500;min-width:260px;animation:slideIn .2s ease;box-shadow:0 4px 20px rgba(0,0,0,.4)}
.toast-success{background:#18181b;border:1px solid rgba(52,211,153,.3);color:#34d399}
.toast-error{background:#18181b;border:1px solid rgba(239,68,68,.3);color:#f87171}
.toast-info{background:#18181b;border:1px solid rgba(96,165,250,.3);color:#60a5fa}
@keyframes slideIn{from{transform:translateX(40px);opacity:0}to{transform:translateX(0);opacity:1}}
.spinner{width:16px;height:16px;border:2px solid #3f3f46;border-top-color:#10b981;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:900px){.kpi-grid{grid-template-columns:repeat(2,1fr)}.grid-2{grid-template-columns:1fr}.sidebar{width:180px}.main{margin-left:180px}}
</style>
</head>
<body>
<div class="layout">
  <div class="sidebar">
    <div class="sidebar-logo">
      <h2>RECRUITMENT AI</h2>
      <p>Admin Console</p>
    </div>
    <div class="nav-section">Main</div>
    <a href="/ui/" class="nav-item {% if active=='dashboard' %}active{% endif %}">
      <div class="nav-dot"></div> Dashboard
    </a>
    <a href="/ui/jobs" class="nav-item {% if active=='jobs' %}active{% endif %}">
      <div class="nav-dot"></div> Jobs
    </a>
    <a href="/ui/candidates" class="nav-item {% if active=='candidates' %}active{% endif %}">
      <div class="nav-dot"></div> Candidates
    </a>
    <div class="nav-section">Pipeline</div>
    <a href="/ui/shortlist" class="nav-item {% if active=='shortlist' %}active{% endif %}">
      <div class="nav-dot"></div> Shortlist
    </a>
    <a href="/ui/outreach" class="nav-item {% if active=='outreach' %}active{% endif %}">
      <div class="nav-dot"></div> Outreach
    </a>
    <a href="/ui/interviews" class="nav-item {% if active=='interviews' %}active{% endif %}">
      <div class="nav-dot"></div> Interviews
    </a>
    <a href="/ui/import" class="nav-item {% if active=='import' %}active{% endif %}">
      <div class="nav-dot"></div> Import / Source
    </a>
    <div class="nav-section">System</div>
    <a href="/ui/system" class="nav-item {% if active=='system' %}active{% endif %}">
      <div class="nav-dot"></div> System Health
    </a>
    <a href="/docs" target="_blank" class="nav-item">
      <div class="nav-dot"></div> API Docs ↗
    </a>
  </div>
  <div class="main">
    {% block content %}{% endblock %}
  </div>
</div>
<div id="toast-container"></div>
<script src="/static/app.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
