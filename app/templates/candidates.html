{% extends "base.html" %}
{% block title %}Candidates{% endblock %}
{% block content %}
<div class="topbar">
  <div class="topbar-left">
    <h1>Candidates</h1>
    <p class="text-muted text-sm" id="cand-sub">Loading…</p>
  </div>
  <button class="btn btn-primary" onclick="showModal('add-modal')">＋ Add Manually</button>
</div>

<div class="card">
  <div class="card-header">
    <span class="card-title" id="cand-count">Candidates</span>
    <div class="flex gap-2 items-center">
      <input type="text" id="search-input" placeholder="Search name, skill, location…"
        oninput="filterTable()" style="width:200px;padding:5px 10px">
      <select id="source-filter" onchange="loadCandidates()" class="filter-select">
        <option value="">All sources</option>
        <option value="NAUKRI">Naukri</option>
        <option value="LINKEDIN">LinkedIn</option>
        <option value="INDEED">Indeed</option>
        <option value="APNA">Apna</option>
        <option value="WORKINDIA">WorkIndia</option>
        <option value="FOUNDIT">Foundit</option>
        <option value="MANUAL">Manual</option>
        <option value="MOCK">Mock</option>
      </select>
    </div>
  </div>
  <div id="cand-table-body">
    <div style="padding:28px;text-align:center"><div class="spinner" style="margin:0 auto"></div></div>
  </div>
</div>

<!-- Add Candidate Modal -->
<div id="add-modal" class="modal-overlay">
  <div class="modal-box modal-lg">
    <div class="modal-header">
      <span class="modal-title">Add Candidate</span>
      <button class="btn btn-ghost btn-sm" onclick="hideModal('add-modal')">✕</button>
    </div>
    <div class="grid-2">
      <div class="form-group"><label>Full Name *</label><input type="text" id="a-name" placeholder="Priya Sharma"></div>
      <div class="form-group"><label>Email</label><input type="email" id="a-email" placeholder="priya@example.com"></div>
      <div class="form-group"><label>Phone</label><input type="text" id="a-phone" placeholder="+91 98765 43210"></div>
      <div class="form-group"><label>WhatsApp</label><input type="text" id="a-whatsapp" placeholder="+91 98765 43210"></div>
      <div class="form-group"><label>Experience (yrs)</label><input type="number" id="a-exp" placeholder="3.5"></div>
      <div class="form-group"><label>Location</label><input type="text" id="a-loc" placeholder="Surat, Gujarat"></div>
      <div class="form-group"><label>Expected Salary (₹)</label><input type="number" id="a-exsal" placeholder="600000"></div>
      <div class="form-group"><label>Notice Period (days)</label><input type="number" id="a-notice" placeholder="30"></div>
      <div class="form-group"><label>Current Role</label><input type="text" id="a-role" placeholder="HR Executive"></div>
      <div class="form-group"><label>Current Employer</label><input type="text" id="a-employer" placeholder="ABC Corp"></div>
    </div>
    <div class="form-group"><label>Skills (comma-separated)</label><input type="text" id="a-skills" placeholder="Payroll, Recruitment, Keka, HRIS"></div>
    <div class="form-group"><label>Education</label><input type="text" id="a-edu" placeholder="BBA / MBA HR"></div>
    <div style="display:flex;gap:10px;margin-top:4px">
      <button class="btn btn-primary" onclick="addCandidate()">＋ Add Candidate</button>
      <button class="btn btn-secondary" onclick="hideModal('add-modal')">Cancel</button>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let allCandidates=[];
const srcColors={NAUKRI:'badge-blue',LINKEDIN:'badge-blue',INDEED:'badge-blue',MOCK:'badge-grey',MANUAL:'badge-purple',APNA:'badge-yellow',WORKINDIA:'badge-yellow',FOUNDIT:'badge-green'};

async function loadCandidates(){
  const source=document.getElementById('source-filter').value;
  const url='/api/v1/candidates?limit=500'+(source?'&source='+source:'');
  allCandidates=await api(url);
  document.getElementById('cand-count').textContent=`Candidates (${allCandidates.length})`;
  document.getElementById('cand-sub').textContent=`${allCandidates.length} profiles in database`;
  renderTable(allCandidates);
}

function filterTable(){
  const q=document.getElementById('search-input').value.toLowerCase();
  if(!q){renderTable(allCandidates);return}
  renderTable(allCandidates.filter(c=>
    c.name.toLowerCase().includes(q)||
    (c.skills||[]).some(s=>s.toLowerCase().includes(q))||
    (c.location||'').toLowerCase().includes(q)||
    (c.current_role||'').toLowerCase().includes(q)||
    (c.current_employer||'').toLowerCase().includes(q)
  ));
}

function renderTable(data){
  const body=document.getElementById('cand-table-body');
  if(!data.length){body.innerHTML='<div class="empty-state"><div class="empty-state-icon">◎</div><p>No candidates found.</p></div>';return}
  body.innerHTML=`<div class="table-wrap"><table>
    <thead><tr><th>Name</th><th>Skills</th><th>Exp</th><th>Location</th><th>Expected ₹</th><th>Source</th><th class="tr-action">Actions</th></tr></thead>
    <tbody>${data.map(c=>`<tr>
      <td>
        <div style="font-weight:600;font-size:12.5px">${esc(c.name)}</div>
        <div style="font-size:11px;color:var(--text-muted)">${esc(c.current_role||'')}${c.current_employer?' @ '+esc(c.current_employer):''}</div>
        ${c.email?`<div style="font-size:10.5px;color:var(--text-dim)">${esc(c.email)}</div>`:''}
      </td>
      <td>${(c.skills||[]).slice(0,3).map(s=>`<span class="badge badge-grey" style="margin:1px;font-size:10px">${esc(s)}</span>`).join('')}${(c.skills||[]).length>3?`<span class="text-muted" style="font-size:10.5px"> +${c.skills.length-3}</span>`:''}</td>
      <td style="color:var(--text-secondary);font-size:12px">${c.experience_years!=null?c.experience_years+'y':'–'}</td>
      <td style="color:var(--text-secondary);font-size:12px">${esc(c.location||'–')}</td>
      <td style="color:var(--text-secondary);font-size:12px">${c.expected_salary?'₹'+(c.expected_salary/100000).toFixed(1)+'L':'–'}</td>
      <td><span class="badge ${srcColors[c.source]||'badge-grey'}" style="font-size:10px">${c.source||'–'}</span></td>
      <td class="tr-action">
        <div class="flex gap-2">
          <a href="/ui/candidate/${c.id}" class="btn btn-primary btn-sm">View Profile</a>
          ${c.email?`<a href="mailto:${esc(c.email)}" class="btn btn-secondary btn-sm" title="${esc(c.email)}">✉</a>`:''}
          ${c.phone?`<a href="tel:${esc(c.phone)}" class="btn btn-secondary btn-sm" title="${esc(c.phone)}">📞</a>`:''}
        </div>
      </td>
    </tr>`).join('')}</tbody>
  </table></div>`;
}

async function addCandidate(){
  const name=document.getElementById('a-name').value.trim();
  if(!name){showToast('Name is required','error');return}
  const skills=document.getElementById('a-skills').value.split(',').map(s=>s.trim()).filter(Boolean);
  const body={
    name,
    email:document.getElementById('a-email').value||undefined,
    phone:document.getElementById('a-phone').value||undefined,
    whatsapp:document.getElementById('a-whatsapp').value||undefined,
    experience_years:parseFloat(document.getElementById('a-exp').value)||undefined,
    location:document.getElementById('a-loc').value||undefined,
    expected_salary:parseFloat(document.getElementById('a-exsal').value)||undefined,
    notice_period_days:parseInt(document.getElementById('a-notice').value)||undefined,
    current_role:document.getElementById('a-role').value||undefined,
    current_employer:document.getElementById('a-employer').value||undefined,
    education:document.getElementById('a-edu').value||undefined,
    skills,source:'MANUAL',
  };
  try{
    await api('/api/v1/candidates',{method:'POST',body});
    showToast('Candidate added','success');
    hideModal('add-modal');
    ['a-name','a-email','a-phone','a-whatsapp','a-exp','a-loc','a-exsal','a-notice','a-role','a-employer','a-edu','a-skills'].forEach(id=>{document.getElementById(id).value=''});
    loadCandidates();
  }catch(e){showToast('Failed: '+e.message,'error')}
}

loadCandidates();
</script>
{% endblock %}
