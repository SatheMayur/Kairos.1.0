{% extends "base.html" %}
{% block title %}Compare Candidates{% endblock %}
{% block content %}

<div class="topbar">
  <div class="topbar-left">
    <h1>Compare Top Candidates</h1>
    <p class="text-muted text-sm">Your best candidates for a role, side by side</p>
  </div>
  <div class="topbar-right" style="display:flex;gap:8px;align-items:center">
    <select id="cmp-job" onchange="loadCompare()" style="padding:5px 10px;font-size:12px;min-width:220px">
      <option value="">Choose a job…</option>
    </select>
    <select id="cmp-count" onchange="loadCompare()" style="padding:5px 10px;font-size:12px">
      <option value="3">Top 3</option>
      <option value="5" selected>Top 5</option>
      <option value="8">Top 8</option>
    </select>
  </div>
</div>

<div id="compare-area">
  <div class="empty-state"><div class="empty-state-icon">⚖</div>
    <p>Pick a job above to compare its strongest candidates.</p></div>
</div>

{% endblock %}

{% block scripts %}
<script>
const SL_COLORS = {
  SHORTLISTED:'badge-blue', CONTACTED:'badge-yellow', INTERESTED:'badge-green',
  INTERVIEW_SCHEDULED:'badge-purple', HIRED:'badge-green', PENDING:'badge-grey'
};

document.addEventListener('DOMContentLoaded', async () => {
  const jobs = await api('/api/v1/jobs?limit=100');
  const sel = document.getElementById('cmp-job');
  jobs.filter(j => j.status === 'ACTIVE').forEach(j => {
    const o = document.createElement('option');
    o.value = j.id; o.textContent = j.title + (j.company ? ' — ' + j.company : '');
    sel.appendChild(o);
  });
  const params = new URLSearchParams(location.search);
  if (params.get('job')) { sel.value = params.get('job'); loadCompare(); }
});

async function loadCompare() {
  const jobId = document.getElementById('cmp-job').value;
  const limit = document.getElementById('cmp-count').value || 5;
  const area = document.getElementById('compare-area');
  if (!jobId) {
    area.innerHTML = `<div class="empty-state"><div class="empty-state-icon">⚖</div><p>Pick a job above to compare its strongest candidates.</p></div>`;
    return;
  }
  area.innerHTML = `<div style="padding:40px;text-align:center"><div class="spinner" style="margin:0 auto"></div></div>`;
  try {
    const d = await api(`/api/v1/shortlist/compare?job_id=${jobId}&limit=${limit}`);
    renderCompare(d);
  } catch(e) {
    area.innerHTML = `<div class="alert alert-error">${esc(e.message)}</div>`;
  }
}

function scoreColor(s) { return s>=65?'#34d399':s>=40?'#fbbf24':'#f87171'; }

function renderCompare(d) {
  const area = document.getElementById('compare-area');
  if (!d.candidates.length) {
    area.innerHTML = `<div class="empty-state"><div class="empty-state-icon">◎</div><p>No candidates in the running for this role yet.</p></div>`;
    return;
  }
  const cols = d.candidates;
  const cell = (label, fn) => `<tr>
    <td style="font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.6px;white-space:nowrap;vertical-align:top;padding:10px 14px">${label}</td>
    ${cols.map(c => `<td style="padding:10px 14px;vertical-align:top;border-left:1px solid var(--border-subtle)">${fn(c)}</td>`).join('')}
  </tr>`;

  area.innerHTML = `<div class="card"><div class="table-wrap"><table style="min-width:${160+cols.length*220}px">
    <tbody>
      ${cell('Candidate', c => `<a href="/ui/candidate/${c.candidate_id}" style="font-weight:700;font-size:13.5px;color:var(--text-primary)">${esc(c.name)}</a>
        <div style="margin-top:4px"><span class="badge ${SL_COLORS[c.status]||'badge-grey'}" style="font-size:9.5px">${esc((c.status||'').replace(/_/g,' '))}</span></div>`)}
      ${cell('Score', c => `<div style="font-size:24px;font-weight:700;color:${scoreColor(c.score||0)}">${c.score!=null?Math.round(c.score):'–'}</div>`)}
      ${cell('Experience', c => c.experience_years!=null ? c.experience_years+' yrs' : '<span class="text-dim">–</span>')}
      ${cell('Current Role', c => esc(c.current_role||'–'))}
      ${cell('Company', c => esc(c.current_employer||'–'))}
      ${cell('Expected ₹', c => c.expected_salary ? '₹'+Math.round(c.expected_salary).toLocaleString('en-IN') : '<span class="text-dim">–</span>')}
      ${cell('Notice', c => c.notice_period_days!=null ? c.notice_period_days+' days' : '<span class="text-dim">–</span>')}
      ${cell('Location', c => esc(c.location||'–'))}
      ${cell('Education', c => esc(c.education||'–'))}
      ${cell('Skills', c => (c.skills||[]).map(s=>`<span class="badge badge-grey" style="font-size:9.5px;margin:1px">${esc(s)}</span>`).join('') || '<span class="text-dim">–</span>')}
      ${cell('✓ Strengths', c => (c.ai_strengths||[]).map(s=>`<div style="font-size:11.5px;color:#34d399;margin-bottom:2px">${esc(s)}</div>`).join('') || '<span class="text-dim">–</span>')}
      ${cell('⚠ Concerns', c => (c.ai_concerns||[]).map(s=>`<div style="font-size:11.5px;color:#f87171;margin-bottom:2px">${esc(s)}</div>`).join('') || '<span class="text-dim">–</span>')}
      ${cell('', c => `<a href="/ui/candidate/${c.candidate_id}" class="btn btn-secondary btn-sm" style="width:100%;justify-content:center">Open profile</a>`)}
    </tbody>
  </table></div></div>`;
}
</script>
{% endblock %}
