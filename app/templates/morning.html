{% extends "base.html" %}
{% block title %}Morning Briefing{% endblock %}
{% block content %}
<div class="topbar">
  <div class="topbar-left">
    <h1 id="brief-greeting">Good morning</h1>
    <p class="text-muted text-sm" id="brief-sub">What happened while you were away…</p>
  </div>
  <button class="btn btn-secondary btn-sm" onclick="loadBrief()">↻ Refresh</button>
</div>

<div id="brief-body">
  <div style="padding:40px;text-align:center"><div class="spinner" style="margin:0 auto"></div></div>
</div>
{% endblock %}

{% block scripts %}
<script>
function fmtTime(iso){ if(!iso) return ''; try{ return new Date(iso).toLocaleString('en-IN',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}); }catch(e){ return iso; } }

async function loadBrief(){
  const body=document.getElementById('brief-body');
  body.innerHTML='<div style="padding:40px;text-align:center"><div class="spinner" style="margin:0 auto"></div></div>';
  let d;
  try{ d=await api('/api/v1/memory/morning-brief'); }
  catch(e){ body.innerHTML=`<div class="alert alert-error">Couldn't load the briefing: ${esc(e.message)}</div>`; return; }

  document.getElementById('brief-greeting').textContent=d.greeting||'Good morning';
  document.getElementById('brief-sub').textContent=
    `Covering the last ${d.window_hours}h`+(d.last_sync_at?` · last synced ${fmtTime(d.last_sync_at)}`:'');

  const wa=d.whatsapp||{}, em=d.email||{}, cal=d.calendar||{}, act=d.action_needed||{};

  body.innerHTML=`
  <div class="kpi-grid" style="grid-template-columns:repeat(4,1fr);margin-bottom:20px">
    <div class="kpi green"><div class="kpi-label">WhatsApp replies</div><div class="kpi-value">${wa.new_replies||0}</div><div class="kpi-sub">while you were away</div></div>
    <div class="kpi purple"><div class="kpi-label">Interviews today</div><div class="kpi-value">${(cal.today||[]).length}</div><div class="kpi-sub">confirmed</div></div>
    <div class="kpi yellow"><div class="kpi-label">Warm leads</div><div class="kpi-value">${(act.interested_to_schedule||[]).length}</div><div class="kpi-sub">said yes — to schedule</div></div>
    <div class="kpi blue"><div class="kpi-label">Emails sent</div><div class="kpi-value">${em.sent||0}</div><div class="kpi-sub">${em.bounced?em.bounced+' bounced':'by the system'}</div></div>
  </div>

  <div class="grid-2">
    <div class="card"><div class="card-header"><span class="card-title">💬 WhatsApp replies</span></div>
      <div class="card-body">${(wa.items&&wa.items.length)?wa.items.map(r=>`
        <div style="padding:8px 0;border-bottom:1px solid var(--border-subtle)">
          <div style="font-weight:600;font-size:12.5px">${esc(r.candidate)} <span class="text-muted" style="font-weight:400">· ${fmtTime(r.ts)}</span></div>
          <div style="font-size:12px;color:var(--text-secondary)">${esc(r.text)}</div>
        </div>`).join(''):'<p class="text-muted" style="font-size:12.5px">No new replies.</p>'}</div></div>

    <div class="card"><div class="card-header"><span class="card-title">📧 Job applicants &amp; responses</span>${em.inbox?`<span class="text-muted text-xs">${em.inbox.unread} unread · snapshot ${fmtTime(em.inbox.fetched_at)}</span>`:''}</div>
      <div class="card-body">${(em.inbox&&em.inbox.recent&&em.inbox.recent.length)?em.inbox.recent.map(m=>`
        <div style="padding:7px 0;border-bottom:1px solid var(--border-subtle)">
          <div style="font-size:12.5px;font-weight:${m.unread?'700':'500'}">${esc(m.subject||'(no subject)')} ${m.unread?'<span class="badge badge-blue" style="font-size:9px">new</span>':''}</div>
          <div style="font-size:11px;color:var(--text-muted)">${esc(m.from||'')} · ${fmtTime(m.date)}</div>
        </div>`).join(''):`<p class="text-muted" style="font-size:12px">${esc(em.note||'No inbox snapshot yet.')}</p>`}</div></div>
  </div>

  <div class="grid-2">
    <div class="card"><div class="card-header"><span class="card-title">📅 Calendar — interviews</span></div>
      <div class="card-body">
        <div style="font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.6px;margin-bottom:4px">Today</div>
        ${(cal.today&&cal.today.length)?cal.today.map(i=>`<div style="font-size:12.5px;padding:3px 0">🟢 ${esc(i.candidate)} — ${esc(i.role)} <span class="text-muted">${fmtTime(i.when)}</span></div>`).join(''):'<p class="text-muted" style="font-size:12px">Nothing today.</p>'}
        <div style="font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.6px;margin:10px 0 4px">Upcoming</div>
        ${(cal.upcoming&&cal.upcoming.length)?cal.upcoming.map(i=>`<div style="font-size:12.5px;padding:3px 0">▫ ${esc(i.candidate)} — ${esc(i.role)} <span class="text-muted">${fmtTime(i.when)}</span></div>`).join(''):'<p class="text-muted" style="font-size:12px">None scheduled.</p>'}
        <p class="text-muted" style="font-size:10.5px;margin-top:8px">${esc(cal.note||'')}</p>
      </div></div>
  </div>

  <div class="card"><div class="card-header"><span class="card-title">✅ Needs your attention</span></div>
    <div class="card-body">
      ${(act.interested_to_schedule&&act.interested_to_schedule.length)?`
        <div style="font-size:12.5px;margin-bottom:8px"><strong>${act.interested_to_schedule.length}</strong> interested candidate(s) waiting for an interview slot:</div>
        <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px">${act.interested_to_schedule.map(c=>`<a href="/ui/candidate/${c.candidate_id}" class="badge badge-green" style="cursor:pointer">${esc(c.candidate)}</a>`).join('')}</div>`:''}
      ${act.interviews_to_log_outcome?`<div style="font-size:12.5px">📝 <strong>${act.interviews_to_log_outcome}</strong> completed interview(s) need an outcome logged — <a href="/ui/interviews" style="color:var(--accent)">open Interviews</a>.</div>`:''}
      ${(!(act.interested_to_schedule||[]).length && !act.interviews_to_log_outcome)?'<p class="text-muted" style="font-size:12.5px">Nothing urgent. 🎉</p>':''}
      <p class="text-muted" style="font-size:10.5px;margin-top:10px">${esc(em.note||'')}</p>
    </div></div>`;
}
loadBrief();
</script>
{% endblock %}
